# Change DOMAIN here to use a different domain
x-domain: &domain ${DOMAIN:-cosmos.gianluca.click}

services:
  cosmos-server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      GITHUB_REPO: darkobyte/COSMOS
      SYNC_INTERVAL: "300000"
    restart: unless-stopped
    volumes:
      - ./server/stargazers.json:/app/stargazers.json
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN:-cosmos.gianluca.click}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=leresolver"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
      - "traefik.http.routers.backend.middlewares=strip-api@docker"
      - "traefik.http.services.backend.loadbalancer.server.port=3001"
      - "traefik.http.services.backend.loadbalancer.server.scheme=http"
    networks:
      - cosmos
      - traefik

  cosmos-frontend:
    build:
      context: ./frontend
      args:
        VITE_WS_URL: wss://${DOMAIN:-cosmos.gianluca.click}/api
    ports:
      - "8081:80"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-cosmos.gianluca.click}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=leresolver"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - cosmos
      - traefik

networks:
  cosmos:
    name: cosmos
    driver: bridge
  traefik:
    external: true
