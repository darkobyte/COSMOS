services:
  earth:
    image: darkobyte/cosmos_planet
    environment:
      # ═══════════════════════════════════════════════════════════════════════════
      # COSMOS PLANET - Environment Variables
      # ═══════════════════════════════════════════════════════════════════════════
      
      # ── Required ──────────────────────────────────────────────────────────────
      
      # SERVER_URL: WebSocket URL of the cosmos server (REQUIRED)
      # ws://dev.gianluca.click:3001
      SERVER_URL: ws://dev.gianluca.click:3001
      
      # PLANET_ID: Unique identifier for this celestial body (REQUIRED)
      # Must be a string with no spaces
      # Example: "earth", "mars", "moon", "jupiter-123"
      PLANET_ID: earth
      
      # ── Basic Properties ──────────────────────────────────────────────────────
      
      # PLANET_NAME: Display name of the body (default: same as PLANET_ID)
      # Example: "Earth", "Erde", "Terra", "Jupiter's Moon"
      PLANET_NAME: Erde
      
      # PLANET_TYPE: Type of celestial body (default: "planet")
      # Valid values: star, planet, moon, asteroid, blackhole
      # Example: "planet", "star", "moon", "asteroid", "blackhole"
      PLANET_TYPE: planet
      
      # PLANET_SIZE: Visual size multiplier (default: 2)
      # Valid values: 1, 2, 3, 4 (integer between 1 and 4)
      # Example: 1 = small (moon), 2 = medium (earth), 3 = large (jupiter), 4 = huge (sun)
      PLANET_SIZE: "2"
      
      # PLANET_INFO: Description text shown in info panel (default: empty)
      # Example: "3. Planet. Einziger bekannter Träger von Leben."
      PLANET_INFO: "3. Planet. Einziger bekannter Träger von Leben."
      
      # ── Composition ───────────────────────────────────────────────────────────
      
      # PLANET_ELEMENTS: Comma-separated list of elements (default: "rock")
      # Valid elements: water, iron, rock, gas, ice, fire, nitrogen, gold, dark_matter
      # Multiple elements will blend colors together
      # Example: "water,iron,rock" = Earth-like (blue-gray-brown blend)
      # Example: "gas" = Gas giant (yellow)
      # Example: "ice,water" = Icy world (light blue)
      # Example: "iron,rock" = Rocky/Mars-like (red-gray)
      # Example: "dark_matter,fire" = Exotic star (purple-orange blend)
      PLANET_ELEMENTS: water,iron,rock
      
      # ── Orbital Mechanics (for orbiting bodies) ──────────────────────────────
      
      # PLANET_PARENT: ID of the parent body to orbit around (default: "none")
      # Set to "none" for fixed-position bodies (stars, stationary objects)
      # Example: "sun" = orbit around sun, "earth" = orbit around earth (moon), "none" = fixed position
      PLANET_PARENT: "none"
      
      # PLANET_RADIUS: Orbital radius in pixels (default: 150)
      # Distance from parent body. Set to "0" for fixed-position bodies
      # Example: "130" = close orbit, "195" = medium orbit, "300" = far orbit, "0" = no orbit
      PLANET_RADIUS: "0"
      
      # PLANET_SPEED: Orbital speed as fraction of 2π per frame (default: 0.005)
      # Higher = faster orbit. Set to "0" for fixed-position bodies
      # Example: "0.008" = fast (Earth), "0.005" = medium (Mars), "0.002" = slow (Jupiter), "0" = stationary
      PLANET_SPEED: "0"
      
      # ── Fixed Position (alternative to orbit) ─────────────────────────────────
      
      # PLANET_FIXED_X: Fixed X coordinate in pixels (optional)
      # Only used when PLANET_PARENT is "none". Must set both X and Y
      # Positive = right, negative = left from center (0,0)
      # Example: "150" = 150px right of center, "-200" = 200px left of center, "0" = center
      PLANET_FIXED_X: "150"
      
      # PLANET_FIXED_Y: Fixed Y coordinate in pixels (optional)
      # Only used when PLANET_PARENT is "none". Must set both X and Y
      # Positive = down, negative = up from center (0,0)
      # Example: "100" = 100px below center, "-150" = 150px above center, "0" = center
      # Note: Fixed bodies must be at least 60px apart from each other
      PLANET_FIXED_Y: "0"
      
      # ═══════════════════════════════════════════════════════════════════════════
      
    restart: unless-stopped

