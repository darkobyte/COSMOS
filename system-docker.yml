services:
  morris:
    image: darkobyte/cosmos_planet
    environment:
      SERVER_URL: ws://cosmos.gianluca.click:3001
      PLANET_ID: morris
      PLANET_NAME: Morris
      PLANET_TYPE: planet
      PLANET_SIZE: "2"
      PLANET_INFO: "Morris ist ein kleiner, felsiger Planet, der in einer engen Umlaufbahn um die Sonne kreist. Er ist bekannt für seine roten Felsen und seine dünne Atmosphäre."
      PLANET_ELEMENTS: iron,rock
      PLANET_PARENT: "cosmos_x"
      PLANET_RADIUS: "250"
      PLANET_SPEED: "0.0005"
      PLANET_FIXED_X: "0"
      PLANET_FIXED_Y: "0"
    restart: unless-stopped
  phillipino:
    image: darkobyte/cosmos_planet
    environment:
      SERVER_URL: ws://cosmos.gianluca.click:3001
      PLANET_ID: phillipino
      PLANET_NAME: Phillippines
      PLANET_TYPE: planet
      PLANET_SIZE: "1"
      PLANET_INFO: "Phillippines ist ein mondähnlicher Planet, der in einer etwas weiteren Umlaufbahn um Morris kreist. Er ist bekannt für seine eisigen Oberflächen und seine bläuliche Farbe."
      PLANET_ELEMENTS: ice,rock
      PLANET_PARENT: "morris"
      PLANET_RADIUS: "50"
      PLANET_SPEED: "0.005"
      PLANET_FIXED_X: "0"
      PLANET_FIXED_Y: "0"
    restart: unless-stopped
  halley:
    image: darkobyte/cosmos_planet
    environment:
      SERVER_URL: ws://cosmos.gianluca.click:3001
      PLANET_ID: halley
      PLANET_NAME: Halley
      PLANET_TYPE: planet
      PLANET_SIZE: "1"
      PLANET_INFO: "GA NIX"
      PLANET_ELEMENTS: fire,rock
      PLANET_PARENT: "morris"
      PLANET_RADIUS: "90"
      PLANET_SPEED: "0.005"
      PLANET_FIXED_X: "0"
      PLANET_FIXED_Y: "0"
    restart: unless-stopped


  sun:
    image: darkobyte/cosmos_planet
    environment:
      SERVER_URL: ws://cosmos.gianluca.click:3001
      PLANET_ID: sun
      PLANET_NAME: Sun
      PLANET_TYPE: star
      PLANET_SIZE: "4"
      PLANET_INFO: "The Sun is the star at the center of our solar system. It is a nearly perfect sphere of hot plasma, radiating energy that sustains life on Earth."
      PLANET_ELEMENTS: fire,gas
      PLANET_PARENT: "cosmos_x"
      PLANET_RADIUS: "780"
      PLANET_SPEED: "0.0005"
      PLANET_FIXED_X: "0"
      PLANET_FIXED_Y: "0"
    restart: unless-stopped
